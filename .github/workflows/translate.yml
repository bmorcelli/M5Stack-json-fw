name: Translate firmware catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install deep-translator requests

      - name: Run translator
        run: |
          python v2/translate_base.py v2/all_device_firmware.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Update translated catalog"
          git push